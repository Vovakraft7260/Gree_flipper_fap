name: Build Gree FAP

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: build
        uses: flipperdevices/flipperzero-ufbt-action@master
        with:
          # Match the Flipper's Momentum dev firmware so the API version lines up
          sdk-channel: dev
          sdk-index-url: https://up.momentum-fw.dev/firmware/directory.json

      - uses: actions/upload-artifact@v4
        with:
          name: gree_remote-fap
          path: ${{ steps.build.outputs.fap-artifacts }}
